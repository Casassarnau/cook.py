<!DOCTYPE html>
<html lang="en" x-data="recipeApp()" x-init="init()" :class="{ dark: darkMode }">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cook.py</title>
    <meta name="description" content="A minimal recipe book for your favorite homemade dishes.">
    <meta name="keywords" content="recipes, Arnau, Arnau Casas, Arnau Casas Saez">
    <meta name="author" content="Arnau Casas Saez">
    <meta name="google-site-verification" content="XKrQhWw8e8nNtXft1NjZv9Ao-CbL10l5ZnHfRk7SAkg" />

    <script>
      (function () {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
        var hash = location.hash;
        if (hash.indexOf('#recipe=') === 0) {
          var recipe = new URLSearchParams(hash.slice(1)).get('recipe');
          if (recipe) document.documentElement.classList.add('route-pending');
        }
      })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer="" src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
    <style>
      /* Smooth color transitions for all elements within .transition-smooth */
      .transition-smooth, .transition-smooth * {
        transition-property: background-color, border-color, color, fill, stroke;
        transition-duration: 500ms;
        transition-timing-function: ease-in-out;
      }
      @media (prefers-reduced-motion: reduce) {
        .transition-smooth, .transition-smooth * {
          transition: none !important;
        }
      }
      /* Hide number input spinners */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      #route-loading { display: none; }
      html.route-pending #app-shell { display: none; }
      html.route-pending #route-loading { display: block; }
      .cook-step-swipe { touch-action: pan-y; }
      #cook-step-panel { overflow: hidden; }
      .cook-step-slide-transition {
        transition: transform 280ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      @media (prefers-reduced-motion: reduce) {
        .cook-step-slide-transition { transition: none !important; }
      }
      /* Fixed bottom dock: solid bg + compositor layer to avoid iOS scroll flicker */
      .recipe-cook-dock {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        transform: translate3d(0, 0, 0);
        -webkit-transform: translate3d(0, 0, 0);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      }
      @media (max-width: 767px) {
        .recipe-cook-dock .recipe-cook-dock-btn {
          box-shadow: none;
        }
      }
    </style>
  </head>

  <body
    class="min-h-screen relative transition-colors duration-300"
    :class="darkMode
      ? 'bg-gradient-to-b from-gray-900 via-slate-900 to-blue-950 text-gray-100'
      : 'bg-gradient-to-b from-sky-200 via-blue-200 to-indigo-200 text-blue-900'"
  >
    <!-- Background overlay to avoid white flashes on hover in dark mode -->
    <div
      class="fixed inset-0 -z-10 transition-colors duration-300"
      :class="darkMode
        ? 'bg-gradient-to-b from-gray-900 via-slate-900 to-blue-950'
        : 'bg-gradient-to-b from-sky-200 via-blue-200 to-indigo-200'"
    ></div>
    <!-- Background uses a simple linear gradient; no decorative blobs -->
    <div class="max-w-5xl mx-auto px-4 py-5 md:p-6">

      <!-- Header -->
      <div class="flex justify-between items-center mb-4 md:mb-6">
        <h1 class="text-2xl md:text-4xl font-bold">Cook.py</h1>

        <div class="flex items-center gap-3">
          <button
            @click="toggleDarkMode"
            class="h-9 px-3 rounded-lg border font-semibold inline-flex items-center transition-colors duration-300 cursor-pointer"
            :class="darkMode
              ? 'bg-gray-800 border-gray-700 text-yellow-300 hover:bg-gray-700'
              : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white'"
          >
            <span x-text="darkMode ? '🌙' : '☀️'"></span>
          </button>

          <select
            x-model="lang"
            @change="loadTranslations()"
            class="h-9 px-3 rounded-lg border font-semibold transition-colors duration-300 cursor-pointer"
            :class="darkMode
              ? 'bg-gray-800 border-gray-600 text-gray-100'
              : 'bg-gray-100 border-gray-300 text-gray-900'"
          >
            <option value="en" x-text="t('lang.en')"></option>
            <option value="cat" x-text="t('lang.cat')"></option>
            <option value="es" x-text="t('lang.es')"></option>
            <option value="sv" x-text="t('lang.sv')"></option>
          </select>
        </div>
      </div>

      <div
        id="route-loading"
        class="flex justify-center items-center py-24"
        aria-busy="true"
        aria-label="Loading recipe"
      >
        <div
          class="h-10 w-10 rounded-full border-4 animate-spin"
          :class="darkMode
            ? 'border-orange-500/30 border-t-orange-500'
            : 'border-indigo-400/40 border-t-indigo-600'"
          role="status"
        ></div>
      </div>

      <div id="app-shell">
      <!-- Main View -->
      <template x-if="!routePending && !selectedRecipe">
        <div>


          <div x-data="{ isFilterOpen: false }">

            <div class="flex justify-center mb-5 md:mb-6">
              <div class="flex w-full md:w-1/2 gap-2">
                <input
                  x-model="searchQuery"
                  type="text"
                  :placeholder="t('search_placeholder')"
                  class="w-full p-2 rounded-lg shadow-sm focus:outline-none focus:ring-2 transition-colors duration-300"
                  :class="darkMode
                    ? 'bg-gray-800 border-gray-700 text-gray-100 placeholder-gray-400 focus:ring-orange-400'
                    : 'bg-gray-100 border border-gray-300 text-gray-900 placeholder-gray-500 focus:ring-indigo-400'"
                />
                
                <button
                  @click="isFilterOpen = true"
                  type="button"
                  class="md:hidden p-2 rounded-lg shadow-sm border flex items-center justify-center transition-colors duration-300 focus:outline-none focus:ring-2"
                  :class="darkMode
                    ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 focus:ring-orange-400'
                    : 'bg-gray-100 border border-gray-300 text-gray-900 hover:bg-gray-200 focus:ring-indigo-400'"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                  </svg>
                </button>
              </div>
            </div>
          
            <div class="hidden md:flex flex-wrap justify-center gap-3 mb-10">
              <template x-for="category in categories" :key="category">
                <button
                  @click="filterCategory = category"
                  class="px-4 py-2 rounded-lg font-semibold shadow transition-colors duration-300"
                  :class="filterCategory === category ? (darkMode ? 'bg-orange-300 text-orange-900 hover:bg-orange-200' : 'bg-indigo-600 text-white') : darkMode ? 'bg-gray-800 border border-gray-600 text-gray-100 hover:bg-gray-700' : 'bg-gray-100 border border-gray-300 text-gray-900 hover:bg-white'"
                >
                  <span x-text="t(`cat.${category}`)"></span>
                </button>
              </template>
          
              <button
                @click="filterCategory = ''"
                class="px-4 py-2 rounded-lg font-semibold shadow-lg transition-colors duration-300"
                :class="filterCategory === '' ? (darkMode ? 'bg-orange-300 text-orange-900 hover:bg-orange-200' : 'bg-indigo-500 text-white') : darkMode ? 'bg-gray-800 border border-gray-600 text-gray-100 hover:bg-gray-700' : 'bg-gray-100 border border-gray-300 text-gray-900 hover:bg-gray-200'"
              >
                <span x-text="t('all_categories')"></span>
              </button>
            </div>
          
            <div 
              x-show="isFilterOpen" 
              x-data="{ 
                isDragging: false, 
                startY: 0, 
                currentY: 0,
                initDrag(e) {
                  this.isDragging = true;
                  this.startY = e.clientY || e.touches[0].clientY;
                  this.currentY = 0;
                },
                doDrag(e) {
                  if (!this.isDragging) return;
                  const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
                  const deltaY = clientY - this.startY;
                  // Only allow dragging downwards (positive Y values)
                  this.currentY = Math.max(0, deltaY);
                },
                endDrag() {
                  if (!this.isDragging) return;
                  this.isDragging = false;
                  // If dragged down more than 120px, snap close. Otherwise, bounce back up.
                  if (this.currentY > 120) {
                    isFilterOpen = false;
                  }
                  this.currentY = 0;
                }
              }"
              x-init="$watch('isFilterOpen', value => { if(!value) currentY = 0 })"
              class="fixed inset-0 z-50 md:hidden touch-none" 
              style="display: none;"
              role="dialog" 
              aria-modal="true"
              @pointermove.window="doDrag"
              @pointerup.window="endDrag"
            >
              <div 
                x-show="isFilterOpen"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0"
                @click="isFilterOpen = false"
                class="fixed inset-0 bg-black/50 backdrop-blur-xs"
              ></div>
          
              <div 
                x-show="isFilterOpen"
                x-transition:enter="transition ease-out duration-300 transform"
                x-transition:enter-start="translate-y-full"
                x-transition:enter-end="translate-y-0"
                x-transition:leave="transition ease-in duration-200 transform"
                x-transition:leave-start="translate-y-0"
                x-transition:leave-end="translate-y-full"
                :style="`transform: translateY(${currentY}px);`"
                :class="[
                  darkMode ? 'bg-gray-900 text-gray-100' : 'bg-white text-gray-900',
                  isDragging ? '' : 'transition-transform duration-300 ease-out'
                ]"
                class="fixed inset-x-0 bottom-0 max-h-[85vh] rounded-t-2xl p-6 shadow-xl flex flex-col select-none"
              >
                <div 
                  @pointerdown="initDrag"
                  class="w-full pt-2 pb-4 cursor-grab active:cursor-grabbing shrink-0 flex justify-center items-center"
                >
                  <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full"></div>
                </div>
          
                <div class="flex justify-between items-center mb-6 shrink-0">
                  <h3 class="text-xl font-bold">Filters</h3>
                  <button 
                    @click="isFilterOpen = false" 
                    class="p-1 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </div>
          
                <div class="flex flex-col gap-3 overflow-y-auto pb-6 touch-pan-y">
                  <p class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Categories</p>
                  
                  <button
                    @click="filterCategory = ''; isFilterOpen = false"
                    class="w-full text-left px-4 py-3 rounded-xl font-semibold shadow-sm transition-colors duration-200 flex justify-between items-center"
                    :class="filterCategory === '' ? (darkMode ? 'bg-orange-300 text-orange-900 hover:bg-orange-200' : 'bg-indigo-500 text-white') : darkMode ? 'bg-gray-800 border border-gray-700 hover:bg-gray-700' : 'bg-gray-50 border border-gray-200 hover:bg-gray-100'"
                  >
                    <span x-text="t('all_categories')"></span>
                    <span x-show="filterCategory === ''" class="font-bold">✓</span>
                  </button>
          
                  <template x-for="category in categories" :key="category">
                    <button
                      @click="filterCategory = category; isFilterOpen = false"
                      class="w-full text-left px-4 py-3 rounded-xl font-semibold shadow-sm transition-colors duration-200 flex justify-between items-center"
                      :class="filterCategory === category ? (darkMode ? 'bg-orange-300 text-orange-900 hover:bg-orange-200' : 'bg-indigo-600 text-white') : darkMode ? 'bg-gray-800 border border-gray-700 hover:bg-gray-700' : 'bg-gray-50 border border-gray-200 hover:bg-gray-100'"
                    >
                      <span x-text="t(`cat.${category}`)"></span>
                      <span x-show="filterCategory === category" class="font-bold">✓</span>
                    </button>
                  </template>
                </div>
              </div>
            </div>
          
          </div>
          <!-- Recipe Cards (from index) -->
          <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              <template x-for="item in filteredCards()" :key="item.path">
                <a
                  :href="'#recipe=' + item.path.replace('recipes/', '').replace('.json', '')"
                  class="block rounded-xl shadow transition-colors duration-300 overflow-hidden"
                :class="darkMode
                  ? 'bg-gray-800 text-gray-100 border border-gray-700 hover:shadow-gray-700'
                  : 'bg-gray-100 text-gray-900 border border-gray-300 hover:shadow-lg hover:bg-white'"
              >
                <div class="relative">
                  <img :src="getImageUrl(item.image, 'lower')" alt="" class="w-full h-40 object-cover" loading="lazy" />
                  <template x-if="item.development">
                    <div class="absolute top-2 right-2 flex items-center gap-1.5 px-2 py-1 rounded-lg backdrop-blur-sm border transition-colors duration-300 shadow-sm"
                      :class="darkMode
                        ? 'bg-yellow-900/70 border-yellow-700/50 text-yellow-200'
                        : 'bg-yellow-200/90 border-yellow-300/50 text-yellow-800'"
                      :title="t('under_development') || 'Under Development'"
                    >
                      <!-- Displays the full translation text consistently across all screen sizes -->
                      <span class="text-xs font-semibold" x-text="t('under_development') || 'Under Development'"></span>
                    </div>
                  </template>
                </div>
                <div class="p-4">
                  <h2 class="text-xl font-bold mb-1" x-text="translateField(item.title)"></h2>
                  <p class="text-sm opacity-80" x-text="item.author ? '👩‍🍳 ' + item.author : ''"></p>
                </div>
              </a>
            </template>
          </div>
        </div>
      </template>

      <!-- Recipe Detail -->
      <template x-if="!routePending && selectedRecipe">
        <div>
        <div class="pb-24">
          <button
            @click="goHome()"
            class="mb-4 font-semibold transition-colors duration-300 cursor-pointer"
            :class="darkMode
              ? 'text-orange-300 hover:text-orange-200'
              : 'text-indigo-700 hover:text-indigo-600'"
          >
            &larr; <span x-text="t('back') || 'Back'"></span>
          </button>

          <div class="relative mb-4">
            <img :src="getImageUrl(selectedRecipe.image, 'lower')" alt="" class="w-full h-56 sm:h-72 md:h-96 object-cover rounded-lg" loading="lazy" />
            <button
              type="button"
              @click="showImageModal = true"
              class="absolute top-3 right-3 p-1 cursor-pointer transition-opacity duration-200 opacity-40 hover:opacity-90 focus:opacity-90 focus:outline-none"
              :title="t('view_image') || 'View image'"
              :aria-label="t('view_image') || 'View image'"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-white drop-shadow-[0_1px_3px_rgba(0,0,0,0.6)]">
                <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
              </svg>
            </button>
            <template x-if="selectedRecipe.development">
              <div class="absolute top-3 left-3 flex items-center gap-2 px-3 py-1.5 rounded-lg backdrop-blur-sm border transition-colors duration-300 shadow-md"
                :class="darkMode
                  ? 'bg-yellow-900/80 border-yellow-700/60 text-yellow-200'
                  : 'bg-yellow-200/95 border-yellow-300/60 text-yellow-800'"
              >
                <span class="text-sm font-semibold" x-text="t('under_development') || 'Under Development'"></span>
              </div>
            </template>
          </div>
          <div class="flex items-start justify-between mb-2">
            <div class="flex-1">
              <h2 class="text-2xl md:text-3xl font-bold mb-1" x-text="translateField(selectedRecipe.title)"></h2>
              <p class="text-sm mb-3 opacity-80" x-text="selectedRecipe.author ? '👩‍🍳 ' + selectedRecipe.author : ''"></p>
            </div>
            <button
              @click="showQRCode()"
              class="ml-4 p-2 rounded-lg border font-semibold transition-colors duration-300 cursor-pointer flex items-center gap-2"
              :class="darkMode
                ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700'
                : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white'"
              :title="t('share_qr') || 'Share recipe'"
            >
              <span>🔗</span>
            </button>
          </div>
          <p class="mb-3 md:mb-4 text-base md:text-lg leading-relaxed transition-colors duration-300"
            :class="darkMode ? 'text-gray-200' : 'text-gray-700'"
            x-text="translateField(selectedRecipe.description)"
          ></p>


          <!-- INGREDIENTS -->
          <div class="mb-8">
            <!-- Variant dropdown - above on mobile, hidden on desktop -->
            <template x-if="hasVariants()">
              <div class="mb-3 sm:hidden">
                <select
                  x-model="selectedVariation"
                  x-init="selectedVariation = selectedRecipe.variants[0].key"
                  @change="updateURL()"
                  class="w-full h-9 px-3 rounded-lg font-medium cursor-pointer transition-colors duration-300 focus:outline-none"
                  :class="darkMode
                    ? 'bg-orange-300 text-orange-900 hover:bg-orange-200'
                    : 'bg-indigo-600 text-white hover:bg-indigo-500'"
                >
                  <template x-for="item in selectedRecipe.variants" :key="item.key">
                    <option :value="item.key" x-text="translateField(item.name)"></option>
                  </template>
                </select>
              </div>
            </template>

            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-3">
              <template x-if="hasServings() || hasUnits() || hasDiameter() || hasArea()">
                <div class="flex items-center gap-3 min-w-0 flex-1">
                  <div class="flex items-center gap-2 sm:gap-3 flex-1 min-w-0">
                    <button
                      type="button"
                      @click="hasArea() ? decrementDimensions() : decrementServings()"
                      class="w-12 h-11 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center font-bold text-lg transition-colors duration-300 cursor-pointer border shrink-0"
                      :class="darkMode
                        ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
                        : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
                      aria-label="Decrease"
                    >
                      −
                    </button>
                    <div
                      class="flex-1 min-w-0 h-11 sm:h-10 px-3 rounded-xl border flex items-center justify-center text-base sm:text-lg font-semibold truncate"
                      :class="darkMode
                        ? 'bg-gray-800/60 border-gray-700 text-gray-100'
                        : 'bg-gray-50 border-gray-300 text-gray-900'"
                      x-text="getIngredientsTitle()"
                    ></div>
                    <button
                      type="button"
                      @click="hasArea() ? incrementDimensions() : incrementServings()"
                      class="w-12 h-11 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center font-bold text-lg transition-colors duration-300 cursor-pointer border shrink-0"
                      :class="darkMode
                        ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
                        : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
                      aria-label="Increase"
                    >
                      +
                    </button>
                  </div>
                  <button
                    type="button"
                    x-show="hasArea()"
                    @click="openDimensionConfig()"
                    class="w-12 h-11 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center transition-colors duration-300 cursor-pointer border shrink-0"
                    :class="darkMode
                      ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
                      : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
                    title="Configure dimensions"
                    aria-label="Configure dimensions"
                  >
                    ⚙️
                  </button>
                </div>
              </template>
              <template x-if="!hasServings() && !hasUnits() && !hasDiameter() && !hasArea()">
                <h3 class="text-xl font-semibold" x-text="t('ingredients._')"></h3>
              </template>
              <!-- Variant dropdown - hidden on mobile, visible on desktop -->
              <template x-if="hasVariants()">
                <select
                  x-model="selectedVariation"
                  x-init="selectedVariation = selectedRecipe.variants[0].key"
                  @change="updateURL()"
                  class="hidden sm:block h-9 px-3 rounded-lg font-medium cursor-pointer transition-colors duration-300 focus:outline-none"
                  :class="darkMode
                    ? 'bg-orange-300 text-orange-900 hover:bg-orange-200'
                    : 'bg-indigo-600 text-white hover:bg-indigo-500'"
                >
                  <template x-for="item in selectedRecipe.variants" :key="item.key">
                    <option :value="item.key" x-text="translateField(item.name)"></option>
                  </template>
                </select>
              </template>
            </div>

            <div class="space-y-6">
              <template x-for="(group, groupIndex) in currentIngredients()" :key="groupIndex">
                <div>
                  <!-- Group header (only show if it's a grouped recipe) -->
                  <template x-if="group.isGroup && group.groupName">
                    <h4 class="text-lg font-semibold mb-3 px-1" 
                        :class="darkMode ? 'text-orange-300' : 'text-indigo-700'"
                        x-text="group.groupName"></h4>
                  </template>
                  
                  <!-- Ingredients list -->
                  <ul class="grid gap-3 sm:grid-cols-2 list-none">
                    <template x-for="(item, index) in group.items" :key="index">
                      <li
                        class="flex items-start gap-3 rounded-lg border p-3 md:p-4 text-base transition-colors duration-300 font-medium"
                        :class="darkMode
                          ? 'bg-gray-800/60 border-gray-700 hover:bg-gray-800'
                          : 'bg-gray-100 border-gray-200 hover:bg-white'"
                      >
                        <span class="flex-shrink-0" x-text="item.emoji" aria-hidden="true"></span>
                        <div class="flex-1 min-w-0">
                          <div class="flex items-baseline gap-1 flex-wrap">
                            <span class="font-semibold" :class="darkMode ? 'text-orange-400' : 'text-indigo-700'" x-text="item.value" x-show="item.value"></span>

                            <!-- For as_needed and to_taste: name + unit -->
                            <template x-if="item.unitKey === 'as_needed' || item.unitKey === 'to_taste'">

    <!-- Dimension Configuration (bottom drawer on mobile, centered modal on desktop) -->
    <template x-if="showDimensionConfig && hasArea()">
      <div
        x-data="{
          isDragging: false,
          startY: 0,
          currentY: 0,
          initDrag(e) {
            this.isDragging = true;
            this.startY = e.clientY || e.touches[0].clientY;
            this.currentY = 0;
          },
          doDrag(e) {
            if (!this.isDragging) return;
            const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
            const deltaY = clientY - this.startY;
            this.currentY = Math.max(0, deltaY);
          },
          endDrag() {
            if (!this.isDragging) return;
            this.isDragging = false;
            if (this.currentY > 120) {
              showDimensionConfig = false;
            }
            this.currentY = 0;
          },
          panelTransform() {
            if (window.matchMedia('(min-width: 768px)').matches) return '';
            if (this.currentY === 0 && !this.isDragging) return '';
            return `transform: translateY(${this.currentY}px)`;
          }
        }"
        x-init="$watch('showDimensionConfig', value => { if(!value) currentY = 0 })"
        class="fixed inset-0 z-50 max-md:touch-none"
        role="dialog"
        aria-modal="true"
        aria-labelledby="dimension-config-title"
        @pointermove.window="doDrag"
        @pointerup.window="endDrag"

          x-show="showDimensionConfig"
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0"
          x-transition:enter-end="opacity-100"
          x-transition:leave="transition ease-in duration-200"
          x-transition:leave-start="opacity-100"
          x-transition:leave-end="opacity-0"
          @click="showDimensionConfig = false"
          class="fixed inset-0 bg-black/50 backdrop-blur-xs pointer-events-auto"
        ></div>

            x-transition:enter="transition ease-out duration-300 transform"
            x-transition:enter-start="translate-y-full md:translate-y-0 md:scale-95 opacity-0 md:opacity-0"
            x-transition:enter-end="translate-y-0 md:scale-100 opacity-100"
            x-transition:leave="transition ease-in duration-200 transform"
            x-transition:leave-start="translate-y-0 md:scale-100 opacity-100"
            x-transition:leave-end="translate-y-full md:translate-y-0 md:scale-95 opacity-0"
            :style="panelTransform()"
            :class="[
              darkMode ? 'bg-gray-900 text-gray-100 md:bg-gray-800' : 'bg-white text-gray-900',
              isDragging ? '' : 'transition-transform duration-300 ease-out'

            class="pointer-events-auto w-full md:max-w-md max-h-[90vh] rounded-t-2xl md:rounded-2xl shadow-xl flex flex-col select-none"
            style="padding-bottom: max(1.5rem, env(safe-area-inset-bottom));"

            class="w-full pt-3 pb-2 cursor-grab active:cursor-grabbing shrink-0 flex justify-center items-center md:hidden"

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>

                </button>
                <button

                  :class="dimensionConfigShape === 'rectangular'
                    ? (darkMode ? 'border-orange-500 bg-orange-500/20' : 'border-indigo-600 bg-indigo-100')

            </div>

            <!-- Circular Dimensions -->
            <template x-if="dimensionConfigShape === 'circular'">
              <div>
                <label class="block text-sm font-medium mb-2"

                  Diameter (cm)

                  <button
                    type="button"

                    class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
                    :class="darkMode
                      ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
                      : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
                    aria-label="Decrease"
                  >−</button>
                  <input
                    type="number"
                    x-model="dimensionConfigDiameter"

                      ? 'bg-gray-800 border-gray-700 text-white'
                      : 'bg-gray-100 border-gray-300 text-gray-900'"

                    type="button"
                    @click="dimensionConfigDiameter++"
                    class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
                    :class="darkMode
                      ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
                      : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
                    aria-label="Increase"
                  >+</button>
                </div>
              </div>
            </template>

            <!-- Rectangular Dimensions -->
            <template x-if="dimensionConfigShape === 'rectangular'">
              <div class="space-y-5">
                <div>
                  <label class="block text-sm font-medium mb-2"
                         :class="darkMode ? 'text-gray-300' : 'text-gray-700'">
                    Width (cm)
                  </label>
                  <div class="flex items-center gap-3">
                    <button
                      type="button"
                      @click="if (dimensionConfigWidth > 5) dimensionConfigWidth--"
                      class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
                      :class="darkMode
                        ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
                        : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"

                    >−</button>
                    <input
                      type="number"
                      x-model="dimensionConfigWidth"
                      min="5"
                      class="flex-1 min-w-0 h-11 px-4 rounded-xl border text-center text-lg font-semibold"
                      :class="darkMode
                        ? 'bg-gray-800 border-gray-700 text-white'
                        : 'bg-gray-100 border-gray-300 text-gray-900'"
                    />
                    <button
                      type="button"
                      @click="dimensionConfigWidth++"
                      class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
                      :class="darkMode
                        ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
                        : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
                      aria-label="Increase"
                    >+</button>
                  </div>
                </div>
                <div>
                  <label class="block text-sm font-medium mb-2"
                         :class="darkMode ? 'text-gray-300' : 'text-gray-700'">
                    Height (cm)
                  </label>
                  <div class="flex items-center gap-3">
                    <button
                      type="button"
                      @click="if (dimensionConfigHeight > 5) dimensionConfigHeight--"
                      class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
                      :class="darkMode
                        ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
                        : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"

                    <input

                      :class="darkMode

                      aria-label="Increase"

            </template>

                  </template>
                  <ul class="space-y-2 list-none">
                    <template x-for="(item, index) in group.items" :key="'cook-d-' + groupIndex + '-' + index">
                      <li
                        class="flex items-start gap-2.5 rounded-lg border p-3 text-lg md:text-xl font-medium transition-colors duration-300"
                        :class="darkMode
                          ? 'bg-gray-800/60 border-gray-700'
                          : 'bg-gray-50 border-gray-200'"
                      >
                        <span class="flex-shrink-0" x-text="item.emoji" aria-hidden="true"></span>
                        <div class="flex-1 min-w-0">
                          <div class="flex items-baseline gap-1 flex-wrap">
                            <span class="font-semibold" :class="darkMode ? 'text-orange-400' : 'text-indigo-700'" x-text="item.value" x-show="item.value"></span>
                            <template x-if="item.unitKey === 'as_needed' || item.unitKey === 'to_taste'">
                              <span class="flex items-baseline gap-1 flex-wrap">
                                <span x-text="item.name"></span>
                                <span x-text="item.unit"></span>
                              </span>
                            </template>
                            <template x-if="item.unitKey == null || (item.unitKey !== 'as_needed' && item.unitKey !== 'to_taste')">
                              <span class="flex items-baseline gap-1 flex-wrap">
                                <span class="font-semibold" :class="darkMode ? 'text-orange-400' : 'text-indigo-700'" x-text="item.unit"></span>
                                <span x-text="item.connector" x-show="item.connector"></span>
                                <span x-text="item.name"></span>
                              </span>
                            </template>
                            <span x-text="item.text" x-show="item.text"></span>
                          </div>
                        </div>
                      </li>
                    </template>
                  </ul>
                </div>
              </template>
            </div>
          </aside>

          <!-- Step area -->
          <div class="flex-1 min-h-0 flex flex-col relative">
            <!-- Desktop side arrows -->
            <button
              type="button"
              @click="prevCookStep()"
              :disabled="cookStepIndex === 0"
              class="hidden md:flex absolute left-2 top-1/2 -translate-y-1/2 z-10 w-12 h-12 rounded-full items-center justify-center text-2xl font-bold border shadow-lg transition-colors cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
              :class="darkMode
                ? 'bg-gray-800 border-gray-600 hover:bg-gray-700 text-gray-100'
                : 'bg-white border-gray-300 hover:bg-gray-50 text-gray-900'"
              :aria-label="t('cook_prev')"
            >
              ‹
            </button>
            <button
              type="button"
              @click="nextCookStep()"
              :disabled="cookStepIndex >= cookStepCount() - 1"
              class="hidden md:flex absolute right-2 top-1/2 -translate-y-1/2 z-10 w-12 h-12 rounded-full items-center justify-center text-2xl font-bold border shadow-lg transition-colors cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
              :class="darkMode
                ? 'bg-gray-800 border-gray-600 hover:bg-gray-700 text-gray-100'
                : 'bg-white border-gray-300 hover:bg-gray-50 text-gray-900'"
              :aria-label="t('cook_next')"
            >
              ›
            </button>

            <!-- Mobile: swipeable step + ingredients stack -->
            <div id="cook-mobile-stack" class="flex-1 min-h-0 flex flex-col md:overflow-y-auto">
              <div
                id="cook-step-panel"
                class="flex-1 min-h-0 px-4 py-4 md:flex-1 md:min-h-0 md:overflow-y-auto md:px-12 md:py-8 md:!h-auto"
                :class="cookStepPanelOverflowClass()"
              >
                <div id="cook-step-measure" class="relative max-w-2xl mx-auto">
                  <!-- Incoming step (peeks in from swipe direction) -->
                  <template x-if="showCookSwipePreview() && getCookStepAt(cookSwipePreviewStepIndex())">
                    <div
                      class="md:hidden absolute inset-0 z-0"
                      :class="cookPreviewSlideClass()"
                      :style="cookPreviewTransformStyle()"
                    >
                      <div
                        class="rounded-xl border p-4 shadow-sm transition-colors duration-300"
                        :class="darkMode
                          ? 'bg-gray-800/70 border-gray-700'
                          : 'bg-white border-gray-200'"
                      >
                        <p class="text-lg leading-relaxed" x-text="getCookStepAt(cookSwipePreviewStepIndex()).text"></p>
                        <template x-if="getCookStepAt(cookSwipePreviewStepIndex()).settingsBadges?.length > 0">
                          <div class="flex flex-wrap gap-2 mt-4">
                            <template x-for="(badge, badgeIdx) in getCookStepAt(cookSwipePreviewStepIndex()).settingsBadges" :key="'pv-' + badgeIdx">
                              <span
                                class="inline-flex items-center rounded-full px-3 py-1.5 text-sm font-semibold"
                                :class="darkMode
                                  ? 'bg-orange-500/20 text-orange-200 border border-orange-500/40'
                                  : 'bg-indigo-100 text-indigo-900 border border-indigo-200'"
                                x-text="badge"
                              ></span>
                            </template>
                          </div>
                        </template>
                      </div>
                      <template x-if="getCookStepAt(cookSwipePreviewStepIndex()).image">
                        <img
                          :src="getImageUrl(getCookStepAt(cookSwipePreviewStepIndex()).image, 'lower')"
                          alt=""
                          class="mt-4 block w-full max-h-64 object-cover object-center rounded-xl border"
                          :class="darkMode ? 'border-gray-700' : 'border-gray-300'"
                        />
                      </template>
                      <template x-if="hasCookIngredientsAt(cookSwipePreviewStepIndex())">
                        <div class="mt-4">
                          <!-- Header/Title section -->
                          <div 
                            class="pb-2 border-b mb-3" 
                            :class="darkMode ? 'border-gray-700' : 'border-gray-200'"
                          >
                            <h3 class="font-semibold text-lg" x-text="t('ingredients._')"></h3>
                          </div>
                      
                          <!-- Ingredients Content Container -->
                          <div class="space-y-2">
                            <template x-for="(group, groupIndex) in getCookIngredientsAt(cookSwipePreviewStepIndex())" :key="'pv-ing-' + groupIndex">
                              <div>
                                <!-- Group Name Subtitle -->
                                <template x-if="group.isGroup && group.groupName">
                                  <h4 class="text-base font-semibold mb-1.5 px-1"
                                      :class="darkMode ? 'text-orange-300' : 'text-indigo-700'"
                                      x-text="group.groupName"></h4>
                                </template>
                      
                                <!-- Original Ingredient Box List -->
                                <ul class="grid gap-1.5 list-none">
                                  <template x-for="(item, index) in group.items" :key="'pv-ing-' + groupIndex + '-' + index">
                                    <li
                                      class="flex items-start gap-2 rounded-md border p-3 text-lg font-medium"
                                      :class="darkMode
                                        ? 'bg-gray-800/60 border-gray-700'
                                        : 'bg-gray-50 border-gray-200'"
                                    >
                                      <!-- Original Emoji and Details markup completely untouched -->
                                      <span class="flex-shrink-0" x-text="item.emoji" aria-hidden="true"></span>
                                      <div class="flex-1 min-w-0">
                                        <div class="flex items-baseline gap-1 flex-wrap">
                                          <span class="font-semibold" :class="darkMode ? 'text-orange-400' : 'text-indigo-700'" x-text="item.value" x-show="item.value"></span>
                                          <template x-if="item.unitKey === 'as_needed' || item.unitKey === 'to_taste'">
                                            <span class="flex items-baseline gap-1 flex-wrap">
                                              <span x-text="item.name"></span>
                                              <span x-text="item.unit"></span>
                                            </span>
                                          </template>
                                          <template x-if="item.unitKey == null || (item.unitKey !== 'as_needed' && item.unitKey !== 'to_taste')">
                                            <span class="flex items-baseline gap-1 flex-wrap">
                                              <span class="font-semibold" :class="darkMode ? 'text-orange-400' : 'text-indigo-700'" x-text="item.unit"></span>
                                              <span x-text="item.connector" x-show="item.connector"></span>
                                              <span x-text="item.name"></span>
                                            </span>
                                          </template>
                                          <span x-text="item.text" x-show="item.text"></span>
                                        </div>
                                      </div>
                                    </li>
                                  </template>
                                </ul>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>

                  <!-- Current step -->
                  <template x-if="currentCookStep()">
                    <div
                      class="relative z-10 md:!transform-none"
                      :class="cookStepSlideClass()"
                      :style="cookStepTransformStyle()"
                    >
                      <div
                        class="rounded-xl border p-4 md:flex md:items-start md:gap-4 md:p-6 shadow-sm transition-colors duration-300"
                        :class="darkMode
                          ? 'bg-gray-800/70 border-gray-700'
                          : 'bg-white border-gray-200'"
                      >
                        <div
                          class="hidden md:flex flex-shrink-0 items-center justify-center w-10 h-10 rounded-full font-bold text-base"
                          :class="darkMode
                            ? 'bg-orange-500/20 text-orange-300 border border-orange-500/40'
                            : 'bg-indigo-200 text-indigo-900 border border-indigo-400'"
                          x-text="cookStepIndex + 1"
                        ></div>
                        <div class="min-w-0 md:flex-1">
                          <p
                            class="text-lg md:text-xl leading-relaxed"
                            x-text="currentCookStep().text"
                            aria-live="polite"
                          ></p>
                          <template x-if="currentCookStep().settingsBadges && currentCookStep().settingsBadges.length > 0">
                            <div class="flex flex-wrap gap-2 mt-4">
                              <template x-for="(badge, badgeIdx) in currentCookStep().settingsBadges" :key="badgeIdx">
                                <span
                                  class="inline-flex items-center rounded-full px-3 py-1.5 text-sm font-semibold"
                                  :class="darkMode
                                    ? 'bg-orange-500/20 text-orange-200 border border-orange-500/40'
                                    : 'bg-indigo-100 text-indigo-900 border border-indigo-200'"
                                  x-text="badge"
                                ></span>
                              </template>
                            </div>
                          </template>
                        </div>
                      </div>
                      <template x-if="currentCookStep().image">
                        <img
                          :src="getImageUrl(currentCookStep().image, 'lower')"
                          alt=""
                          class="mt-4 block w-full max-h-64 md:max-h-96 object-cover object-center rounded-xl border"
                          :class="darkMode ? 'border-gray-700' : 'border-gray-300'"
                        />
                      </template>
                      <template x-if="hasCookStepIngredients()">
                        <div class="mt-4 md:hidden">
                          <!-- Header/Title section -->
                          <div 
                            class="pb-2 border-b mb-3" 
                            :class="darkMode ? 'border-gray-700' : 'border-gray-200'"
                          >
                            <h3 class="font-semibold text-lg" x-text="t('ingredients._')"></h3>
                          </div>
                      
                          <!-- Ingredients Content Container -->
                          <div class="space-y-2">
                            <template x-for="(group, groupIndex) in currentCookIngredients()" :key="'cur-ing-' + groupIndex">
                              <div>
                                <!-- Group Name Subtitle -->
                                <template x-if="group.isGroup && group.groupName">
                                  <h4 class="text-base font-semibold mb-1.5 px-1"
                                      :class="darkMode ? 'text-orange-300' : 'text-indigo-700'"
                                      x-text="group.groupName"></h4>
                                </template>
                      
                                <!-- Original Ingredient Box List -->
                                <ul class="grid gap-1.5 list-none">
                                  <template x-for="(item, index) in group.items" :key="'cur-ing-' + groupIndex + '-' + index">
                                    <li
                                      class="flex items-start gap-2 rounded-md border p-3 text-lg font-medium"
                                      :class="darkMode
                                        ? 'bg-gray-800/60 border-gray-700'
                                        : 'bg-gray-50 border-gray-200'"
                                    >
                                      <!-- Original Emoji and Details markup completely untouched -->
                                      <span class="flex-shrink-0" x-text="item.emoji" aria-hidden="true"></span>
                                      <div class="flex-1 min-w-0">
                                        <div class="flex items-baseline gap-1 flex-wrap">
                                          <span class="font-semibold" :class="darkMode ? 'text-orange-400' : 'text-indigo-700'" x-text="item.value" x-show="item.value"></span>
                                          <template x-if="item.unitKey === 'as_needed' || item.unitKey === 'to_taste'">
                                            <span class="flex items-baseline gap-1 flex-wrap">
                                              <span x-text="item.name"></span>
                                              <span x-text="item.unit"></span>
                                            </span>
                                          </template>
                                          <template x-if="item.unitKey == null || (item.unitKey !== 'as_needed' && item.unitKey !== 'to_taste')">
                                            <span class="flex items-baseline gap-1 flex-wrap">
                                              <span class="font-semibold" :class="darkMode ? 'text-orange-400' : 'text-indigo-700'" x-text="item.unit"></span>
                                              <span x-text="item.connector" x-show="item.connector"></span>
                                              <span x-text="item.name"></span>
                                            </span>
                                          </template>
                                          <span x-text="item.text" x-show="item.text"></span>
                                        </div>
                                      </div>
                                    </li>
                                  </template>
                                </ul>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Mobile bottom navigation -->
        <div
          class="md:hidden flex-shrink-0 flex items-center gap-3 px-4 py-3 border-t safe-area-pb transition-colors duration-300"
          :class="darkMode ? 'border-gray-700 bg-gray-900/95' : 'border-gray-200 bg-white/95'"
        >
          <button
            type="button"
            @click="prevCookStep()"
            :disabled="cookStepIndex === 0"
            class="flex-1 h-12 rounded-xl font-semibold border transition-colors cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
            :class="darkMode
              ? 'bg-gray-800 border-gray-600 hover:bg-gray-700'
              : 'bg-gray-100 border-gray-300 hover:bg-white'"
          >
            <span x-text="t('cook_prev')"></span>
          </button>
          <button
            type="button"
            @click="nextCookStep()"
            :disabled="cookStepIndex >= cookStepCount() - 1"
            class="flex-1 h-12 rounded-xl font-semibold transition-colors cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
            :class="darkMode
              ? 'bg-orange-500 text-white hover:bg-orange-600 disabled:bg-orange-500/50'
              : 'bg-indigo-600 text-white hover:bg-indigo-700 disabled:bg-indigo-600/50'"
          >
            <span x-text="t('cook_next')"></span>
          </button>
        </div>
      </div>
    </template>

    <!-- Cook Adjust Modal -->
    <template x-if="showCookAdjustModal && cookMode">
      <div
        class="fixed inset-0 z-[70] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/50"
        @click.self="showCookAdjustModal = false"
      >
        <div
          class="w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl shadow-xl max-h-[85vh] overflow-y-auto"
          :class="darkMode ? 'bg-gray-800' : 'bg-white'"
        >
          <div class="p-5">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-lg font-semibold" x-text="t('cook_adjust')"></h3>
              <button
                type="button"
                @click="showCookAdjustModal = false"
                class="p-1 rounded-lg transition-colors cursor-pointer"
                :class="darkMode ? 'text-gray-400 hover:bg-gray-700' : 'text-gray-500 hover:bg-gray-100'"
              >
                ✕
              </button>
            </div>

            <template x-if="hasVariants()">
              <div class="mb-4">
                <label class="block text-sm font-medium mb-2" x-text="t('variation')"></label>
                <select
                  x-model="selectedVariation"
                  @change="clampCookStepIndex(); updateURL()"
                  class="w-full h-10 px-3 rounded-lg font-medium cursor-pointer transition-colors duration-300 focus:outline-none"
                  :class="darkMode
                    ? 'bg-gray-700 border border-gray-600 text-white'
                    : 'bg-gray-100 border border-gray-300 text-gray-900'"
                >
                  <template x-for="item in selectedRecipe.variants" :key="item.key">
                    <option :value="item.key" x-text="translateField(item.name)"></option>
                  </template>
                </select>
              </div>
            </template>

            <template x-if="hasServings() || hasUnits() || hasDiameter() || hasArea()">
              <div class="mb-4">
                <div class="flex items-center gap-3">
                  <div class="flex items-center gap-3 flex-1 min-w-0">
                    <button
                      type="button"
                      @click="hasArea() ? decrementDimensions() : decrementServings()"
                      class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
                      :class="darkMode
                        ? 'bg-gray-700 border-gray-600 text-gray-100 hover:bg-gray-600 active:bg-gray-500'
                        : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
                      aria-label="Decrease"
                    >−</button>
                    <div
                      class="flex-1 min-w-0 h-11 px-3 rounded-xl border flex items-center justify-center text-lg font-semibold truncate"
                      :class="darkMode
                        ? 'bg-gray-800/60 border-gray-600 text-gray-100'
                        : 'bg-gray-50 border-gray-300 text-gray-900'"
                      x-text="getIngredientsTitle()"
                    ></div>
                    <button
                      type="button"
                      @click="hasArea() ? incrementDimensions() : incrementServings()"
                      class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
                      :class="darkMode
                        ? 'bg-gray-700 border-gray-600 text-gray-100 hover:bg-gray-600 active:bg-gray-500'
                        : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
                      aria-label="Increase"
                    >+</button>
                  </div>
                  <button
                    type="button"
                    x-show="hasArea()"
                    @click="openDimensionConfig(); showCookAdjustModal = false"
                    class="w-12 h-11 rounded-xl flex items-center justify-center transition-colors cursor-pointer border shrink-0"
                    :class="darkMode
                      ? 'bg-gray-700 border-gray-600 hover:bg-gray-600 active:bg-gray-500'
                      : 'bg-gray-100 border-gray-300 hover:bg-white active:bg-gray-200'"
                    title="Configure dimensions"
                    aria-label="Configure dimensions"
                  >⚙️</button>
                </div>
              </div>
            </template>

            <template x-if="thermomixAvailable">
              <div class="flex items-center justify-between">
                <span class="text-sm font-medium" x-text="t('thermomix')"></span>
                <button
                  type="button"
                  role="switch"
                  :aria-checked="thermomixEnabled"
                  @click="toggleThermomix()"
                  class="relative inline-flex h-7 w-12 flex-shrink-0 rounded-full border-2 border-transparent transition-colors duration-300 cursor-pointer focus:outline-none"
                  :class="thermomixEnabled
                    ? (darkMode ? 'bg-orange-500' : 'bg-indigo-500')
                    : (darkMode ? 'bg-gray-700' : 'bg-gray-300')"
                >
                  <span
                    class="pointer-events-none inline-block h-6 w-6 transform rounded-full bg-white shadow ring-0 transition duration-300"
                    :class="thermomixEnabled ? 'translate-x-5' : 'translate-x-0'"
                  ></span>
                </button>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
