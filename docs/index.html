<!DOCTYPE html>
<html lang="en" x-data="recipeApp()" x-init="init()" :class="{ dark: darkMode }">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cook.py</title>
    <meta name="description" content="A minimal recipe book for your favorite homemade dishes." />
    <meta name="keywords" content="recipes, Arnau, Arnau Casas, Arnau Casas Saez" />
    <meta name="author" content="Arnau Casas Saez" />
    <meta name="google-site-verification" content="XKrQhWw8e8nNtXft1NjZv9Ao-CbL10l5ZnHfRk7SAkg" />

    <script>
      (function () {
        if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
        var hash = location.hash;
        if (hash.indexOf('#recipe=') === 0) {
          var recipe = new URLSearchParams(hash.slice(1)).get('recipe');
          if (recipe) document.documentElement.classList.add('route-pending');
        }
      })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
    <link rel="stylesheet" href="css/app.css" />
  </head>

  <body
    class="min-h-screen relative transition-colors duration-300"
    :class="darkMode
      ? 'bg-gradient-to-b from-gray-900 via-slate-900 to-blue-950 text-gray-100'
      : 'bg-gradient-to-b from-sky-200 via-blue-200 to-indigo-200 text-blue-900'"
  >
    <div
      class="fixed inset-0 -z-10 transition-colors duration-300"
      :class="darkMode
        ? 'bg-gradient-to-b from-gray-900 via-slate-900 to-blue-950'
        : 'bg-gradient-to-b from-sky-200 via-blue-200 to-indigo-200'"
    ></div>

    <div class="max-w-5xl mx-auto px-4 py-5 md:p-6">
      <div id="component-header"></div>
      <div id="component-route-loading"></div>
      <div id="component-app-shell"></div>
    </div>

    <div id="component-modals"></div>

    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/search.js"></script>
    <script src="js/data.js"></script>
    <script src="js/preferences.js"></script>
    <script src="js/routing.js"></script>
    <script src="js/portions.js"></script>
    <script src="js/ingredients.js"></script>
    <script src="js/variants.js"></script>
    <script src="js/thermomix.js"></script>
    <script src="js/instructions.js"></script>
    <script src="js/cook-mode.js"></script>
    <script src="js/sharing.js"></script>
    <script src="js/bottom-sheet.js"></script>
    <script src="app.js"></script>
    <script src="js/asset-path.js"></script>
    <script src="js/bootstrap.js"></script>
  </body>
</html>
