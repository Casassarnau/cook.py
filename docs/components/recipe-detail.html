<div>
  <div class="max-md:pb-cook-dock">
    <button
      @click="goHome()"
      class="mb-4 font-semibold transition-colors duration-300 cursor-pointer"
      :class="darkMode
              ? 'text-orange-300 hover:text-orange-200'
              : 'text-indigo-700 hover:text-indigo-600'"
    >
      &larr; <span x-text="t('back') || 'Back'"></span>
    </button>

    <div class="relative mb-4">
      <img
        :src="getImageUrl(selectedRecipe.image, 'lower')"
        @error="handleImageError($event, 'lower')"
        alt=""
        class="w-full h-56 sm:h-72 md:h-96 object-cover rounded-lg"
        loading="lazy"
      />
      <button
        type="button"
        @click="showImageModal = true"
        class="absolute top-3 right-3 p-1 cursor-pointer transition-opacity duration-200 opacity-40 hover:opacity-90 focus:opacity-90 focus:outline-none"
        :title="t('view_image') || 'View image'"
        :aria-label="t('view_image') || 'View image'"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-white drop-shadow-[0_1px_3px_rgba(0,0,0,0.6)]">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
        </svg>
      </button>
      <template x-if="selectedRecipe.development">
        <!-- @include partials/development-badge-hero.html -->
      </template>
    </div>

    <div class="flex items-start justify-between gap-3 mb-2">
      <div class="flex-1 min-w-0">
        <h2 class="text-2xl md:text-3xl font-bold mb-1" x-text="translateField(selectedRecipe.title)"></h2>
        <p class="text-sm mb-3 opacity-80" x-text="selectedRecipe.author ? '👩‍🍳 ' + selectedRecipe.author : ''"></p>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <button
          x-show="!cookMode && cookStepCount() > 0"
          type="button"
          @click="enterCookMode()"
          class="hidden md:inline-flex items-center h-11 px-5 rounded-xl font-semibold shadow-sm transition-colors duration-300 cursor-pointer"
          :class="darkMode
                  ? 'bg-orange-300 text-orange-900 hover:bg-orange-200'
                  : 'bg-indigo-600 text-white hover:bg-indigo-700'"
        >
          <span x-text="t('start_cooking')"></span>
        </button>
        <button
          @click="showQRCode()"
          class="p-2 rounded-lg border font-semibold transition-colors duration-300 cursor-pointer flex items-center gap-2"
          :class="darkMode
                  ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700'
                  : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white'"
          :title="t('share_qr') || 'Share recipe'"
        >
          <span>🔗</span>
        </button>
      </div>
    </div>

    <p class="mb-3 md:mb-4 text-base md:text-lg leading-relaxed transition-colors duration-300"
       :class="darkMode ? 'text-gray-200' : 'text-gray-700'"
       x-text="translateField(selectedRecipe.description)"
    ></p>

    <div class="mb-8">
      <template x-if="hasVariants()">
        <!-- @include partials/variant-select-mobile.html -->
      </template>

      <div class="sm:hidden mb-3">
        <template x-if="hasServings() || hasUnits() || hasDiameter() || hasArea()">
          <!-- @include partials/portion-stepper-recipe.html -->
        </template>
        <template x-if="!hasServings() && !hasUnits() && !hasDiameter() && !hasArea()">
          <h3 class="text-xl font-semibold" x-text="t('ingredients._')"></h3>
        </template>
      </div>

      <!-- @include partials/ingredients-header-desktop.html -->

      <!-- @include partials/ingredient-groups-recipe.html -->
    </div>

    <div>
      <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <h3 class="text-xl font-semibold" x-text="t('instructions')"></h3>
        <!-- @include partials/thermomix-toggle.html -->
      </div>

      <ol class="space-y-4">
        <template x-for="(step, idx) in currentInstructions()" :key="idx">
          <li
            role="listitem"
            class="relative overflow-hidden rounded-xl border shadow-sm transition-all duration-300"
            :class="darkMode
                    ? 'bg-gray-800/70 border-gray-700 hover:bg-gray-800'
                    : 'bg-gray-100 border-gray-200 hover:bg-white'"
          >
            <div class="p-4 md:p-5 flex items-start gap-3">
              <div
                class="flex-shrink-0 flex items-center justify-center w-8 h-8 rounded-full font-bold text-sm"
                :class="darkMode
                        ? 'bg-orange-500/20 text-orange-300 border border-orange-500/40'
                        : 'bg-indigo-200 text-indigo-900 border border-indigo-400'"
                x-text="idx + 1"
              ></div>
              <div class="flex-1 min-w-0">
                <p class="text-base md:text-lg" x-text="step.text"></p>
                <template x-if="step.settingsBadges && step.settingsBadges.length > 0">
                  <div class="flex flex-wrap gap-2 mt-3">
                    <template x-for="(badge, badgeIdx) in step.settingsBadges" :key="badgeIdx">
                      <span
                        class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-semibold"
                        :class="darkMode
                                ? 'bg-orange-500/15 text-orange-200 border border-orange-500/30'
                                : 'bg-indigo-100 text-indigo-900 border border-indigo-200'"
                        x-text="badge"
                      ></span>
                    </template>
                  </div>
                </template>
              </div>
            </div>
            <template x-if="step.image">
              <img
                :src="getImageUrl(step.image, 'lower')"
                @error="handleImageError($event, 'lower')"
                alt="Step illustration"
                class="block w-full max-h-96 sm:max-h-[28rem] md:max-h-[32rem] object-cover object-center"
                :class="darkMode
                        ? 'border-t border-gray-700'
                        : 'border-t border-gray-300'"
              />
            </template>
          </li>
        </template>
      </ol>
    </div>
  </div>

  <div
    x-show="!cookMode && cookStepCount() > 0"
    class="md:hidden fixed inset-x-0 bottom-0 z-40 border-t pb-[max(0.75rem,env(safe-area-inset-bottom))] transform-gpu backface-hidden"
    :class="darkMode
            ? 'border-gray-700 bg-gray-900'
            : 'border-gray-200 bg-white'"
  >
    <div aria-hidden="true" class="pointer-events-none absolute inset-x-0 top-full h-[120px] bg-inherit"></div>
    <div class="max-w-5xl mx-auto px-4 pt-3">
      <button
        type="button"
        @click="enterCookMode()"
        class="w-full h-12 rounded-xl font-semibold shadow-lg max-md:shadow-none transition-colors duration-300 cursor-pointer"
        :class="darkMode
                ? 'bg-orange-300 text-orange-900 hover:bg-orange-200'
                : 'bg-indigo-600 text-white hover:bg-indigo-700'"
      >
        <span x-text="t('start_cooking')"></span>
      </button>
    </div>
  </div>
</div>
