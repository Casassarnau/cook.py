<div class="flex items-center gap-3 min-w-0 flex-1">
  <div class="flex items-center gap-2 sm:gap-3 flex-1 min-w-0">
    <button
      type="button"
      @click="hasArea() ? decrementDimensions() : decrementServings()"
      class="w-12 h-11 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center font-bold text-lg transition-colors duration-300 cursor-pointer border shrink-0"
      :class="darkMode
              ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
              : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
      aria-label="Decrease"
    >−</button>
    <div
      class="flex-1 min-w-0 h-11 sm:h-10 px-3 rounded-xl border flex items-center justify-center text-base sm:text-lg font-semibold truncate"
      :class="darkMode
              ? 'bg-gray-800/60 border-gray-700 text-gray-100'
              : 'bg-gray-50 border-gray-300 text-gray-900'"
      x-text="getPortionLabel()"
    ></div>
    <button
      type="button"
      @click="hasArea() ? incrementDimensions() : incrementServings()"
      class="w-12 h-11 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center font-bold text-lg transition-colors duration-300 cursor-pointer border shrink-0"
      :class="darkMode
              ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
              : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
      aria-label="Increase"
    >+</button>
  </div>
  <button
    type="button"
    x-show="hasArea()"
    @click="openDimensionConfig()"
    class="w-12 h-11 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center transition-colors duration-300 cursor-pointer border shrink-0"
    :class="darkMode
            ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
            : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
    title="Configure dimensions"
    aria-label="Configure dimensions"
  >⚙️</button>
</div>
