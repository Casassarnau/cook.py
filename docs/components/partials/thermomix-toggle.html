<div x-show="thermomixAvailable" class="flex items-center gap-2 select-none">
  <span class="text-sm font-medium" x-text="t('thermomix')"></span>
  <button
    type="button"
    role="switch"
    :aria-checked="thermomixEnabled"
    @click="toggleThermomix()"
    class="relative inline-flex h-7 w-12 flex-shrink-0 rounded-full border-2 border-transparent transition-colors duration-300 cursor-pointer focus:outline-none"
    :class="thermomixEnabled
            ? (darkMode ? 'bg-orange-500' : 'bg-indigo-500')
            : (darkMode ? 'bg-gray-700' : 'bg-gray-300')"
  >
    <span
      class="pointer-events-none inline-block h-6 w-6 transform rounded-full bg-white shadow ring-0 transition duration-300"
      :class="thermomixEnabled ? 'translate-x-5' : 'translate-x-0'"
    ></span>
  </button>
</div>
