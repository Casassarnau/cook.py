<div class="mt-4 md:hidden">
  <div
    class="pb-2 border-b mb-3"
    :class="darkMode ? 'border-gray-700' : 'border-gray-200'"
  >
    <h3 class="font-semibold text-lg" x-text="t('ingredients._')"></h3>
  </div>
  <div class="space-y-2">
    <template x-for="(group, groupIndex) in currentCookIngredients()" :key="'cur-ing-' + groupIndex">
      <div>
        <template x-if="group.isGroup && group.groupName">
          <h4 class="text-base font-semibold mb-1.5 px-1"
              :class="darkMode ? 'text-orange-300' : 'text-indigo-700'"
              x-text="group.groupName"></h4>
        </template>
        <ul class="grid gap-1.5 list-none">
          <template x-for="(item, index) in group.items" :key="'cur-ing-' + groupIndex + '-' + index">
            <li
              class="flex items-start gap-2 rounded-md border p-3 text-lg font-medium"
              :class="darkMode
                ? 'bg-gray-800/60 border-gray-700'
                : 'bg-gray-50 border-gray-200'"
            >
              <!-- @include partials/ingredient-row-content.html -->
            </li>
          </template>
        </ul>
      </div>
    </template>
  </div>
</div>
