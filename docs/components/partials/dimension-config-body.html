<div
  @pointerdown="initDrag"
  class="w-full pt-3 pb-2 cursor-grab active:cursor-grabbing shrink-0 flex justify-center items-center md:hidden"
>
  <div class="w-12 h-1.5 rounded-full" :class="darkMode ? 'bg-gray-700' : 'bg-gray-300'"></div>
</div>

<div class="flex justify-between items-center px-6 pb-4 shrink-0 md:pt-6 md:px-6 md:pb-0">
  <h3
    class="text-xl font-bold md:font-semibold"
    :class="darkMode ? 'text-white' : 'text-gray-900'"
  >
    Configure Pan Dimensions
  </h3>
  <button
    type="button"
    @click="showDimensionConfig = false"
    class="p-1 rounded-full transition-colors"
    :class="darkMode ? 'hover:bg-gray-800 text-gray-300' : 'hover:bg-gray-100 text-gray-500'"
    :aria-label="t('close')"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</div>

<div class="flex-1 overflow-y-auto touch-pan-y px-6 pb-2 md:py-6">
  <div class="mb-5">
    <label class="block text-sm font-medium mb-2"
           :class="darkMode ? 'text-gray-300' : 'text-gray-700'">
      Shape
    </label>
    <div class="flex gap-3">
      <button
        type="button"
        @click="setAreaShape('circular')"
        class="flex-1 p-4 rounded-xl border-2 transition-all cursor-pointer"
        :class="dimensionConfigShape === 'circular'
          ? (darkMode ? 'border-orange-500 bg-orange-500/20' : 'border-indigo-600 bg-indigo-100')
          : (darkMode ? 'border-gray-700 hover:border-gray-600' : 'border-gray-300 hover:border-gray-400')"
      >
        <div class="text-3xl mb-1">🍰</div>
        <div class="text-sm font-medium"
             :class="darkMode ? 'text-white' : 'text-gray-900'">
          Circular
        </div>
      </button>
      <button
        type="button"
        @click="setAreaShape('rectangular')"
        class="flex-1 p-4 rounded-xl border-2 transition-all cursor-pointer"
        :class="dimensionConfigShape === 'rectangular'
          ? (darkMode ? 'border-orange-500 bg-orange-500/20' : 'border-indigo-600 bg-indigo-100')
          : (darkMode ? 'border-gray-700 hover:border-gray-600' : 'border-gray-300 hover:border-gray-400')"
      >
        <div class="text-3xl mb-1">📐</div>
        <div class="text-sm font-medium"
             :class="darkMode ? 'text-white' : 'text-gray-900'">
          Rectangular
        </div>
      </button>
    </div>
  </div>

  <template x-if="dimensionConfigShape === 'circular'">
    <div>
      <label class="block text-sm font-medium mb-2"
             :class="darkMode ? 'text-gray-300' : 'text-gray-700'">
        Diameter (cm)
      </label>
      <div class="flex items-center gap-3">
        <button
          type="button"
          @click="if (dimensionConfigDiameter > 1) dimensionConfigDiameter--"
          class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
          :class="darkMode
            ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
            : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
          aria-label="Decrease"
        >−</button>
        <input
          type="number"
          x-model="dimensionConfigDiameter"
          min="1"
          class="flex-1 min-w-0 h-11 px-4 rounded-xl border text-center text-lg font-semibold"
          :class="darkMode
            ? 'bg-gray-800 border-gray-700 text-white'
            : 'bg-gray-100 border-gray-300 text-gray-900'"
        />
        <button
          type="button"
          @click="dimensionConfigDiameter++"
          class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
          :class="darkMode
            ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
            : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
          aria-label="Increase"
        >+</button>
      </div>
    </div>
  </template>

  <template x-if="dimensionConfigShape === 'rectangular'">
    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium mb-2"
               :class="darkMode ? 'text-gray-300' : 'text-gray-700'">
          Width (cm)
        </label>
        <div class="flex items-center gap-3">
          <button
            type="button"
            @click="if (dimensionConfigWidth > 5) dimensionConfigWidth--"
            class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
            :class="darkMode
              ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
              : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
            aria-label="Decrease"
          >−</button>
          <input
            type="number"
            x-model="dimensionConfigWidth"
            min="5"
            class="flex-1 min-w-0 h-11 px-4 rounded-xl border text-center text-lg font-semibold"
            :class="darkMode
              ? 'bg-gray-800 border-gray-700 text-white'
              : 'bg-gray-100 border-gray-300 text-gray-900'"
          />
          <button
            type="button"
            @click="dimensionConfigWidth++"
            class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
            :class="darkMode
              ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
              : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
            aria-label="Increase"
          >+</button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2"
               :class="darkMode ? 'text-gray-300' : 'text-gray-700'">
          Height (cm)
        </label>
        <div class="flex items-center gap-3">
          <button
            type="button"
            @click="if (dimensionConfigHeight > 5) dimensionConfigHeight--"
            class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
            :class="darkMode
              ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
              : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
            aria-label="Decrease"
          >−</button>
          <input
            type="number"
            x-model="dimensionConfigHeight"
            min="5"
            class="flex-1 min-w-0 h-11 px-4 rounded-xl border text-center text-lg font-semibold"
            :class="darkMode
              ? 'bg-gray-800 border-gray-700 text-white'
              : 'bg-gray-100 border-gray-300 text-gray-900'"
          />
          <button
            type="button"
            @click="dimensionConfigHeight++"
            class="w-12 h-11 rounded-xl flex items-center justify-center font-bold text-lg transition-colors cursor-pointer border shrink-0"
            :class="darkMode
              ? 'bg-gray-800 border-gray-700 text-gray-100 hover:bg-gray-700 active:bg-gray-600'
              : 'bg-gray-100 border-gray-300 text-gray-900 hover:bg-white active:bg-gray-200'"
            aria-label="Increase"
          >+</button>
        </div>
      </div>
    </div>
  </template>
</div>

<div class="flex flex-col-reverse sm:flex-row gap-3 px-6 pt-4 shrink-0 md:px-6 md:pb-6">
  <button
    type="button"
    @click="showDimensionConfig = false"
    class="w-full sm:flex-1 h-12 rounded-xl font-medium transition-colors cursor-pointer"
    :class="darkMode
      ? 'bg-gray-800 text-gray-200 hover:bg-gray-700 active:bg-gray-600'
      : 'bg-gray-200 text-gray-900 hover:bg-gray-300 active:bg-gray-400'"
  >
    Cancel
  </button>
  <button
    type="button"
    @click="applyDimensionChanges()"
    class="w-full sm:flex-1 h-12 rounded-xl font-semibold transition-colors cursor-pointer"
    :class="darkMode
      ? 'bg-orange-600 text-white hover:bg-orange-700 active:bg-orange-800'
      : 'bg-indigo-600 text-white hover:bg-indigo-500 active:bg-indigo-700'"
  >
    Apply
  </button>
</div>
