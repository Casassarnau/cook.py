<template x-for="(group, groupIndex) in currentCookIngredients()" :key="'cook-d-' + groupIndex">
  <div>
    <template x-if="group.isGroup && group.groupName">
      <h4 class="text-base font-semibold mb-2 px-1"
          :class="darkMode ? 'text-orange-300' : 'text-indigo-700'"
          x-text="group.groupName"></h4>
    </template>
    <ul class="space-y-2 list-none">
      <template x-for="(item, index) in group.items" :key="'cook-d-' + groupIndex + '-' + index">
        <li
          class="flex items-start gap-2.5 rounded-lg border p-3 text-lg md:text-xl font-medium transition-colors duration-300"
          :class="darkMode
                  ? 'bg-gray-800/60 border-gray-700'
                  : 'bg-gray-50 border-gray-200'"
        >
          <!-- @include partials/ingredient-row-content.html -->
        </li>
      </template>
    </ul>
  </div>
</template>
