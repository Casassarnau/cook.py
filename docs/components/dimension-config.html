<!-- Dimension Configuration (bottom drawer on mobile, centered modal on desktop) -->
<div
  x-show="showDimensionConfig && hasArea()"
  x-data="bottomSheetDrag(() => { showDimensionConfig = false }, { desktopModal: true })"
  x-init="$watch('showDimensionConfig', value => { if (!value) resetDrag() })"
  class="fixed inset-0 z-50 max-md:touch-none"
  style="display: none;"
  role="dialog"
  aria-modal="true"
  aria-label="Configure Pan Dimensions"
  @pointermove.window="doDrag"
  @pointerup.window="endDrag"
>
  <div
    x-show="showDimensionConfig"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @click="showDimensionConfig = false"
    class="fixed inset-0 bg-black/50 backdrop-blur-xs pointer-events-auto"
  ></div>

  <!-- Mobile: fixed bottom sheet (same pattern as filter drawer) -->
  <div
    x-show="showDimensionConfig"
    x-transition:enter="transition ease-out duration-300 transform"
    x-transition:enter-start="translate-y-full"
    x-transition:enter-end="translate-y-0"
    x-transition:leave="transition ease-in duration-200 transform"
    x-transition:leave-start="translate-y-0"
    x-transition:leave-end="translate-y-full"
    :style="panelTransform()"
    :class="[
      darkMode ? 'bg-gray-900 text-gray-100' : 'bg-white text-gray-900',
      isDragging ? '' : 'transition-transform duration-300 ease-out'
    ]"
    class="md:hidden fixed inset-x-0 bottom-0 max-h-[90vh] rounded-t-2xl shadow-xl flex flex-col select-none pointer-events-auto"
    style="padding-bottom: max(1.5rem, env(safe-area-inset-bottom));"
  >
    <!-- @include partials/dimension-config-body.html -->
  </div>

  <!-- Desktop: centered modal -->
  <div class="hidden md:flex fixed inset-0 items-center justify-center pointer-events-none p-4">
    <div
      x-show="showDimensionConfig"
      x-transition:enter="transition ease-out duration-300 transform"
      x-transition:enter-start="scale-95 opacity-0"
      x-transition:enter-end="scale-100 opacity-100"
      x-transition:leave="transition ease-in duration-200 transform"
      x-transition:leave-start="scale-100 opacity-100"
      x-transition:leave-end="scale-95 opacity-0"
      :class="darkMode ? 'bg-gray-800 text-gray-100' : 'bg-white text-gray-900'"
      class="pointer-events-auto w-full max-w-md max-h-[90vh] rounded-2xl shadow-xl flex flex-col select-none overflow-hidden"
    >
      <!-- @include partials/dimension-config-body.html -->
    </div>
  </div>
</div>
