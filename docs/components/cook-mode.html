<!-- Cook Mode -->
<template x-if="cookMode && selectedRecipe">
  <div
    class="vv-overlay z-[60] flex flex-col cook-step-swipe transition-colors duration-300"
    :class="darkMode
            ? 'bg-gray-900 text-gray-100'
            : 'bg-gray-50 text-gray-900'"
    @keydown.window="handleCookKeydown($event)"
    @touchstart="handleCookTouchStart($event)"
    @touchend="handleCookTouchEnd($event)"
    x-init="$el.addEventListener('touchmove', e => handleCookTouchMove(e), { passive: false })"
    role="dialog"
    aria-modal="true"
    :aria-label="translateField(selectedRecipe.title)"
  >
        <!-- Header -->
    <div
      class="flex-shrink-0 px-3 py-2.5 md:px-5 md:py-3 border-b transition-colors duration-300"
      :class="darkMode ? 'border-gray-700 bg-gray-900/95' : 'border-gray-200 bg-white/95'"
    >
      <div class="flex items-center gap-2 md:gap-3">
        <button
          type="button"
          @click="exitCookMode()"
          class="flex-shrink-0 p-2 rounded-lg transition-colors cursor-pointer"
          :class="darkMode ? 'hover:bg-gray-800 text-gray-300' : 'hover:bg-gray-100 text-gray-600'"
          :aria-label="t('exit_cook_mode')"
        >
          ✕
        </button>
        <div class="flex-1 min-w-0">
          <h2 class="text-base md:text-lg font-bold truncate" x-text="translateField(selectedRecipe.title)"></h2>
          <p class="text-xs md:text-sm opacity-70 truncate" x-text="formatCookStepLabel()"></p>
        </div>
        <button
          type="button"
          @click="showCookAdjustModal = true"
          class="flex-shrink-0 h-9 px-3 rounded-lg text-sm font-medium border transition-colors cursor-pointer"
          :class="darkMode
                  ? 'border-gray-600 hover:bg-gray-800'
                  : 'border-gray-300 hover:bg-gray-100'"
        >
          <span x-text="t('cook_adjust')"></span>
        </button>
      </div>
      <div class="mt-2 h-1 rounded-full overflow-hidden" :class="darkMode ? 'bg-gray-800' : 'bg-gray-200'">
        <div
          class="h-full transition-all duration-300"
          :class="darkMode ? 'bg-orange-500' : 'bg-indigo-500'"
          :style="`width: ${cookProgressPercent()}%`"
        ></div>
      </div>
      <div class="mt-2 flex flex-wrap gap-1.5" x-show="getCookSummaryChips().length > 0">
        <template x-for="(chip, chipIdx) in getCookSummaryChips()" :key="chipIdx">
          <span
            class="text-xs px-2 py-0.5 rounded-full font-medium"
            :class="darkMode
                    ? 'bg-gray-800 text-gray-300 border border-gray-700'
                    : 'bg-gray-100 text-gray-600 border border-gray-200'"
            x-text="chip"
          ></span>
        </template>
      </div>
    </div>

        <!-- Main content -->
    <div class="flex-1 min-h-0 flex flex-col md:flex-row">
          <!-- Desktop ingredients sidebar -->
      <aside
        x-show="hasCookStepIngredients()"
        class="hidden md:flex md:flex-col md:w-80 lg:w-96 md:flex-shrink-0 border-r overflow-y-auto transition-colors duration-300"
        :class="darkMode ? 'border-gray-700 bg-gray-900/50' : 'border-gray-200 bg-white/80'"
      >
        <div class="p-4 sticky top-0 z-10 border-b" :class="darkMode ? 'border-gray-700 bg-gray-900/95' : 'border-gray-200 bg-white/95'">
          <h3 class="text-lg font-semibold" x-text="getIngredientsTitle()"></h3>
        </div>
        <div class="p-4 space-y-4">
              <!-- @include partials/ingredient-groups-cook-desktop.html -->
        </div>
      </aside>

          <!-- Step area -->
      <div class="flex-1 min-h-0 flex flex-col relative">
            <!-- Desktop side arrows -->
        <button
          type="button"
          @click="prevCookStep()"
          :disabled="cookStepIndex === 0 || cookSwipeAnimating"
          class="hidden md:flex absolute left-2 top-1/2 -translate-y-1/2 z-10 w-12 h-12 rounded-full items-center justify-center text-2xl font-bold border shadow-lg transition-colors cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
          :class="darkMode
                  ? 'bg-gray-800 border-gray-600 hover:bg-gray-700 text-gray-100'
                  : 'bg-white border-gray-300 hover:bg-gray-50 text-gray-900'"
          :aria-label="t('cook_prev')"
        >
          ‹
        </button>
        <button
          type="button"
          @click="nextCookStep()"
          :disabled="cookStepIndex >= cookStepCount() - 1 || cookSwipeAnimating"
          class="hidden md:flex absolute right-2 top-1/2 -translate-y-1/2 z-10 w-12 h-12 rounded-full items-center justify-center text-2xl font-bold border shadow-lg transition-colors cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
          :class="darkMode
                  ? 'bg-gray-800 border-gray-600 hover:bg-gray-700 text-gray-100'
                  : 'bg-white border-gray-300 hover:bg-gray-50 text-gray-900'"
          :aria-label="t('cook_next')"
        >
          ›
        </button>

            <!-- Mobile: swipeable step + ingredients stack -->
        <div id="cook-mobile-stack" class="flex-1 min-h-0 flex flex-col md:overflow-y-auto">
          <div
            id="cook-step-panel"
            class="flex-1 min-h-0 px-4 py-4 md:flex-1 md:min-h-0 md:overflow-y-auto md:px-12 md:py-8 md:!h-auto"
            :class="cookStepPanelOverflowClass()"
          >
            <div id="cook-step-measure" class="relative max-w-2xl mx-auto">
                  <!-- Incoming step (peeks in from swipe direction; layer stays mounted for smooth drag) -->
              <div
                class="md:hidden absolute inset-0 z-0"
                :class="cookPreviewSlideClass()"
                :style="cookPreviewLayerStyle()"
              >
                <template x-if="cookSwipePreviewStepIndex() != null && getCookStepAt(cookSwipePreviewStepIndex())">
                  <div>
                    <div
                      class="rounded-xl border p-4 shadow-sm transition-colors duration-300"
                      :class="darkMode
                              ? 'bg-gray-800/70 border-gray-700'
                              : 'bg-white border-gray-200'"
                    >
                      <p class="text-lg leading-relaxed" x-text="getCookStepAt(cookSwipePreviewStepIndex()).text"></p>
                      <template x-if="getCookStepAt(cookSwipePreviewStepIndex()).settingsBadges?.length > 0">
                        <div class="flex flex-wrap gap-2 mt-4">
                          <template x-for="(badge, badgeIdx) in getCookStepAt(cookSwipePreviewStepIndex()).settingsBadges" :key="'pv-' + badgeIdx">
                            <span
                              class="inline-flex items-center rounded-full px-3 py-1.5 text-sm font-semibold"
                              :class="darkMode
                                      ? 'bg-orange-500/20 text-orange-200 border border-orange-500/40'
                                      : 'bg-indigo-100 text-indigo-900 border border-indigo-200'"
                              x-text="badge.text"
                            ></span>
                          </template>
                        </div>
                      </template>
                    </div>
                    <template x-if="getCookStepAt(cookSwipePreviewStepIndex()).image">
                      <img
                        :src="getImageUrl(getCookStepAt(cookSwipePreviewStepIndex()).image, 'lower')"
                        @error="handleImageError($event, 'lower')"
                        alt=""
                        class="mt-4 block w-full max-h-64 object-cover object-center rounded-xl border"
                        :class="darkMode ? 'border-gray-700' : 'border-gray-300'"
                      />
                    </template>
                    <template x-if="hasCookIngredientsAt(cookSwipePreviewStepIndex())">
                        <!-- @include partials/ingredient-panel-cook-preview.html -->
                    </template>
                  </div>
                </template>
              </div>

                  <!-- Current step (layer stays mounted for smooth drag) -->
              <div
                class="relative z-10 md:!transform-none"
                :class="cookStepSlideClass()"
                :style="cookStepTransformStyle()"
              >
                <template x-if="currentCookStep()">
                  <div>
                    <div
                      class="rounded-xl border p-4 md:flex md:items-start md:gap-4 md:p-6 shadow-sm transition-colors duration-300"
                      :class="darkMode
                              ? 'bg-gray-800/70 border-gray-700'
                              : 'bg-white border-gray-200'"
                    >
                      <div
                        class="hidden md:flex flex-shrink-0 items-center justify-center w-10 h-10 rounded-full font-bold text-base"
                        :class="darkMode
                                ? 'bg-orange-500/20 text-orange-300 border border-orange-500/40'
                                : 'bg-indigo-200 text-indigo-900 border border-indigo-400'"
                        x-text="cookStepIndex + 1"
                      ></div>
                      <div class="min-w-0 md:flex-1">
                        <p
                          class="text-lg md:text-xl leading-relaxed"
                          x-text="currentCookStep().text"
                          aria-live="polite"
                        ></p>
                        <template x-if="currentCookStep().settingsBadges && currentCookStep().settingsBadges.length > 0">
                          <div class="flex flex-wrap gap-2 mt-4">
                            <template x-for="(badge, badgeIdx) in currentCookStep().settingsBadges" :key="badgeIdx">
                              <span
                                class="inline-flex items-center rounded-full px-3 py-1.5 text-sm font-semibold"
                                :class="darkMode
                                        ? 'bg-orange-500/20 text-orange-200 border border-orange-500/40'
                                        : 'bg-indigo-100 text-indigo-900 border border-indigo-200'"
                                x-text="badge.text"
                              ></span>
                            </template>
                          </div>
                        </template>
                      </div>
                    </div>
                    <template x-if="currentCookStep().image">
                      <img
                        :src="getImageUrl(currentCookStep().image, 'lower')"
                        @error="handleImageError($event, 'lower')"
                        alt=""
                        class="mt-4 block w-full max-h-64 md:max-h-96 object-cover object-center rounded-xl border"
                        :class="darkMode ? 'border-gray-700' : 'border-gray-300'"
                      />
                    </template>
                    <template x-if="hasCookStepIngredients()">
                        <!-- @include partials/ingredient-panel-cook-current.html -->
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

        <!-- Mobile bottom navigation -->
    <div
      class="md:hidden flex-shrink-0 flex items-center gap-3 px-4 py-3 border-t safe-area-pb transition-colors duration-300"
      :class="darkMode ? 'border-gray-700 bg-gray-900/95' : 'border-gray-200 bg-white/95'"
    >
      <button
        type="button"
        @click="prevCookStep()"
        :disabled="cookStepIndex === 0 || cookSwipeAnimating"
        class="flex-1 h-12 rounded-xl font-semibold border transition-colors cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
        :class="darkMode
                ? 'bg-gray-800 border-gray-600 hover:bg-gray-700'
                : 'bg-gray-100 border-gray-300 hover:bg-white'"
      >
        <span x-text="t('cook_prev')"></span>
      </button>
      <button
        type="button"
        @click="nextCookStep()"
        :disabled="cookStepIndex >= cookStepCount() - 1 || cookSwipeAnimating"
        class="flex-1 h-12 rounded-xl font-semibold transition-colors cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
        :class="darkMode
                ? 'bg-orange-500 text-white hover:bg-orange-600 disabled:bg-orange-500/50'
                : 'bg-indigo-600 text-white hover:bg-indigo-700 disabled:bg-indigo-600/50'"
      >
        <span x-text="t('cook_next')"></span>
      </button>
    </div>
  </div>
</template>
